name: sql-review-env
version: "1.0.0"
description: >
  An environment where an AI agent must fix broken SQL queries.
  Tasks are graded deterministically by executing against a fixed SQLite dataset.
author: Susheel
tags:
  - openenv
  - sql
  - code-review
  - data-cleaning
tasks:
  - id: easy
    description: Fix basic syntax errors in a simple SELECT query
    difficulty: easy
    max_steps: 10
  - id: medium
    description: Fix a GROUP BY query with aggregate filtering
    difficulty: medium
    max_steps: 10
  - id: hard
    description: Fix a JOIN with subquery and ORDER BY clause
    difficulty: hard
    max_steps: 15
action_space:
  type: object
  properties:
    query:
      type: string
      description: The corrected SQL query
    explanation:
      type: string
      description: Optional explanation of the fix
observation_space:
  type: object
  properties:
    task_description: {type: string}
    broken_query: {type: string}
    feedback: {type: string}
    score: {type: number}
    hint: {type: string}

