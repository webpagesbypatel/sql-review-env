name: sql-review-env
version: "1.0.0"
description: >
  An OpenEnv RL environment where AI agents learn to identify and fix
  broken SQL queries. Graded deterministically via SQLite execution.
  Real-world task: SQL debugging is done by millions of developers daily.
author: Susheel
tags:
  - openenv
  - reinforcement-learning
  - sql
  - code-review
  - data-cleaning
  - agent-evaluation

tasks:
  - id: easy
    description: Fix keyword typos in a simple SELECT query (SELCT, FORM, WHER)
    difficulty: easy
    max_steps: 10
    success_threshold: 0.7

  - id: medium
    description: Fix a GROUP BY aggregate query with HAVING clause
    difficulty: medium
    max_steps: 10
    success_threshold: 0.7

  - id: hard
    description: Fix a multi-table JOIN with correlated subquery and ORDER BY
    difficulty: hard
    max_steps: 15
    success_threshold: 0.7

action_space:
  type: object
  properties:
    query:
      type: string
      description: The corrected SQL query
    explanation:
      type: string
      description: Optional explanation (not graded)

observation_space:
  type: object
  properties:
    task_description:
      type: string
      description: What the query should do
    broken_query:
      type: string
      description: The buggy SQL to fix
    feedback:
      type: string
      description: Detailed grader output from last step
    score:
      type: number
      description: Current step score 0.0-1.0
    hint:
      type: string
      description: Keyword hint after 3 failed steps

reward:
  type: number
  min: 0.0
  max: 1.0
  description: >
    4-component reward: syntax_valid(0.3) + returns_rows(0.2)
    + keyword_match(0.3) + correct_columns(0.2).
    Penalizes repeated identical submissions.
